version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nats-admin-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: nats_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nats_admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: nats-admin-nats
    command: ["-c", "/etc/nats/server.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
      - "8223:8223"
    volumes:
      - ./nats/server.conf:/etc/nats/server.conf:ro
      - nats_data:/data/nats
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  nats_data:
