services:
  nats:
    image: nats:2.10-alpine
    container_name: nats-admin-nats
    command: ["-c", "/etc/nats/server.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
      - "8223:8223"
    volumes:
      - ./nats/server.conf:/etc/nats/server.conf:ro
      - nats_data:/data/nats
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats-admin:
    image: ghcr.io/chenxiaoli/nats-admin:latest
    container_name: nats-admin-backend
    command: ["server"]
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
    environment:
      PORT: "8080"
      ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      NATS_URL: nats://nats:4222
      OPERATOR_SEED: ${OPERATOR_SEED:?set OPERATOR_SEED}
      SYSTEM_ACCOUNT_SEED: ${SYSTEM_ACCOUNT_SEED:?set SYSTEM_ACCOUNT_SEED}
      MASTER_KEY: ${MASTER_KEY:?set MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-changeme}

volumes:
  nats_data:
