services:
  nats:
    image: nats:2.10-alpine
    container_name: nats-admin-nats
    command: ["-c", "/etc/nats/server.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
      - "8223:8223"
    volumes:
      - ./nats/server.conf:/etc/nats/server.conf:ro
      - nats_data:/data/nats
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats-admin:
    image: ghcr.io/chenxiaoli/nats-admin:latest
    container_name: nats-admin-backend
    command: ["server"]
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: "8080"
      NATS_URL: nats://nats:4222

volumes:
  nats_data:
